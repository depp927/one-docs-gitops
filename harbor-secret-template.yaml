# Harbor 镜像拉取凭证
# 使用前请先执行以下命令在集群中创建 Secret（不要将真实凭证提交到 Git）：
#
# kubectl create secret docker-registry harbor-registry-secret \
#   --docker-server=harbor.onepoker.cc \
#   --docker-username=<your-harbor-username> \
#   --docker-password=<your-harbor-password> \
#   --namespace=dev
#
# 或者使用 ArgoCD 的 Vault / External Secrets Operator 管理凭证

apiVersion: v1
kind: Secret
metadata:
  name: harbor-registry-secret
  namespace: dev
type: kubernetes.io/dockerconfigjson
data:
  # base64 编码的 docker config，通过上方 kubectl 命令自动生成
  .dockerconfigjson: <base64-encoded-docker-config>
